<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Dashboard - Chat</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    body { font-family: Arial; margin: 20px; }
    #chat { height: 400px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; }
    .message { margin: 5px 0; padding: 8px; border-radius: 5px; }
    .user { background: #dcf8c6; text-align: right; }
    .admin { background: #fff; }
  </style>
</head>
<body>
  <h2>সাপোর্ট চ্যাট</h2>
  <div id="chat"></div>
  <input type="text" id="messageInput" placeholder="মেসেজ লিখুন...">
  <button onclick="sendMessage()">পাঠান</button>

  <script>
    const socket = io('http://localhost:5000');
    const userId = 'user123'; // Dynamic from auth

    socket.emit('join', { userId, role: 'user' });

    function sendMessage() {
      const input = document.getElementById('messageInput');
      if (input.value.trim()) {
        socket.emit('send-message', {
          userId,
          message: input.value,
          role: 'user'
        });
        input.value = '';
      }
    }

    socket.on('new-message', (msg) => {
      const chat = document.getElementById('chat');
      const div = document.createElement('div');
      div.className = `message ${msg.senderRole}`;
      div.innerHTML = `<strong>${msg.senderRole === 'user' ? 'আপনি' : 'অ্যাডমিন'}:</strong> ${msg.message} <small>${new Date(msg.timestamp).toLocaleTimeString()}</small>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    });

    socket.on('previous-messages', (msgs) => {
      msgs.forEach(msg => {
        // similar append logic
      });
    });
  </script>
</body>
</html>
